<svg xmlns="http://www.w3.org/2000/svg" width="880" height="1100" viewBox="0 0 880 1100" role="img" aria-label="English Natural-Science Journal Skills — 100 flagship journals">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0f2747"/>
      <stop offset="1" stop-color="#10243a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="880" height="1100" fill="url(#bg)"/>
  <rect x="36" y="36" width="808" height="1028" rx="28" fill="none" stroke="#1e3a5f" stroke-width="2"/>

  <!-- orbital motif -->
  <g transform="translate(440,250)" stroke="url(#accent)" fill="none" opacity="0.85">
    <circle r="120" stroke-width="2"/>
    <ellipse rx="120" ry="46" stroke-width="1.6" transform="rotate(28)"/>
    <ellipse rx="120" ry="46" stroke-width="1.6" transform="rotate(-28)"/>
    <ellipse rx="120" ry="46" stroke-width="1.6" transform="rotate(90)"/>
    <circle r="9" fill="url(#accent)" stroke="none"/>
    <circle cx="120" cy="0" r="6" fill="#38bdf8" stroke="none" transform="rotate(28)"/>
    <circle cx="-120" cy="0" r="6" fill="#34d399" stroke="none" transform="rotate(-28)"/>
    <circle cx="0" cy="120" r="6" fill="#22d3ee" stroke="none"/>
  </g>

  <text x="440" y="470" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="58" fill="#f8fafc" font-weight="700">Natural-Science</text>
  <text x="440" y="536" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="58" fill="#f8fafc" font-weight="700">Journal Skills</text>

  <text x="440" y="600" text-anchor="middle" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="24" fill="#94a3b8" letter-spacing="2">100 FLAGSHIP ENGLISH JOURNALS</text>

  <line x1="240" y1="640" x2="640" y2="640" stroke="url(#accent)" stroke-width="3"/>

  <!-- discipline chips -->
  <g font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#e2e8f0" text-anchor="middle">
    <g transform="translate(440,705)">
      <rect x="-360" y="-26" width="180" height="48" rx="24" fill="#13233c" stroke="#2b4a72"/>
      <text x="-270" y="6">Nature · Science</text>
      <rect x="-170" y="-26" width="150" height="48" rx="24" fill="#13233c" stroke="#2b4a72"/>
      <text x="-95" y="6">Cell · PNAS</text>
      <rect x="-10" y="-26" width="170" height="48" rx="24" fill="#13233c" stroke="#2b4a72"/>
      <text x="75" y="6">NEJM · Lancet</text>
      <rect x="170" y="-26" width="190" height="48" rx="24" fill="#13233c" stroke="#2b4a72"/>
      <text x="265" y="6">JAMA · BMJ</text>
    </g>
    <g transform="translate(440,765)">
      <rect x="-360" y="-26" width="150" height="48" rx="24" fill="#13233c" stroke="#2b4a72"/>
      <text x="-285" y="6">PRL · RMP</text>
      <rect x="-200" y="-26" width="150" height="48" rx="24" fill="#13233c" stroke="#2b4a72"/>
      <text x="-125" y="6">JACS · Angew</text>
      <rect x="-40" y="-26" width="180" height="48" rx="24" fill="#13233c" stroke="#2b4a72"/>
      <text x="50" y="6">Nat. Materials</text>
      <rect x="150" y="-26" width="210" height="48" rx="24" fill="#13233c" stroke="#2b4a72"/>
      <text x="255" y="6">Annals of Math.</text>
    </g>
  </g>

  <text x="440" y="868" text-anchor="middle" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="21" fill="#7c93ad">life · medicine · physics · chemistry</text>
  <text x="440" y="898" text-anchor="middle" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="21" fill="#7c93ad">materials · earth · CS/AI · mathematics</text>

  <text x="440" y="982" text-anchor="middle" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#cbd5e1">One fit-and-house-style skill per journal · + router</text>
  <text x="440" y="1016" text-anchor="middle" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#64748b">sibling of the 100 econ / business journal bundle</text>
</svg>
